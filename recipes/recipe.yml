# This is your custom image name and metadata
name: evilpandas-os
description: My custom Bluefin image with DisplayLink and kernel dev tools.

# This IS Bluefin. Bluefin is part of the ublue-os organization.
base-image: ghcr.io/ublue-os/bluefin-dx
image-version: latest

modules:
  # We consolidate everything into a containerfile module to handle the 
  # complex dependency dance and repo requirements for DisplayLink.
  - type: containerfile
    snippets:
      - |
        # 1. Add the Negativo17 repository
        RUN curl -Lo /etc/yum.repos.d/fedora-multimedia.repo https://negativo17.org/repos/fedora-multimedia.repo
        
        # 2. Install kernel headers and build tools needed for the driver
        # Note: We need to ensure kernel, kernel-devel, and kernel-headers versions match
        RUN rpm-ostree install kernel-devel kernel-headers kernel-core akmods && \
            echo "Installed kernel packages:" && \
            rpm -qa | grep "^kernel"
        
        # 3. Install libevdi first (this should not pull in akmod-evdi)
        RUN rpm-ostree install libevdi
        
        # 4. Download all DisplayLink-related packages with dependencies, then install
        # them manually with --noscripts to skip the akmod-evdi post-install scriptlet
        # that tries to build as root. We'll build the kernel module manually in step 6.
        RUN dnf download --resolve displaylink akmod-evdi -y
        
        # 5. Install all downloaded packages without running scriptlets.
        # This prevents akmod-evdi from trying to build as root during installation.
        RUN rpm -Uvh --noscripts *.rpm && rm -f *.rpm
        
        # 6. Build evdi kernel module manually using rpmbuild (bypass akmods due to /tmp restrictions)
        # The akmodsbuild script is hardcoded to use /tmp which has permission issues in containers.
        # Instead, we'll build the module directly using rpmbuild.
        RUN KERNEL_VERSION=$(rpm -q kernel-devel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' | tail -n 1) && \
            echo "Building evdi module for kernel ${KERNEL_VERSION}" && \
            mkdir -p /root/rpmbuild/BUILD /root/rpmbuild/RPMS /root/rpmbuild/SOURCES /root/rpmbuild/SPECS /root/rpmbuild/SRPMS && \
            cd /root/rpmbuild && \
            echo "Installing source RPM:" && \
            rpm -ivh /usr/src/akmods/evdi-kmod-*.src.rpm && \
            echo "Building kmod with rpmbuild:" && \
            rpmbuild --rebuild \
              --define "_topdir /root/rpmbuild" \
              --define "kernels ${KERNEL_VERSION}" \
              --target x86_64 \
              /usr/src/akmods/evdi-kmod-*.src.rpm && \
            echo "Looking for built kmod RPM:" && \
            find /root/rpmbuild/RPMS -name "kmod-evdi*.rpm" -ls && \
            echo "Installing kmod-evdi RPM:" && \
            rpm -Uvh /root/rpmbuild/RPMS/x86_64/kmod-evdi*.rpm && \
            echo "Verifying module installation:" && \
            find /lib/modules/${KERNEL_VERSION} -name "evdi.ko*" -ls && \
            depmod -a "${KERNEL_VERSION}" && \
            modinfo evdi

  # Finally, our tuning script to enable the service and set config
  - type: script
    scripts:
      - displaylink-fix.sh
